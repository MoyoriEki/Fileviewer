<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Dropbox Filer</title>
<link rel="stylesheet" href="https://moyorieki.github.io/storage-bridge/storage-bridge.css">
<script src="https://moyorieki.github.io/storage-bridge/storage-bridge.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&display=swap');

:root {
  --bg: #111114;
  --bg-raised: #19191e;
  --bg-hover: #222228;
  --bg-selected: #2a2a35;
  --text: #d8d8e0;
  --text-muted: #6e6e80;
  --accent: #6ea8fe;
  --accent-dim: rgba(110,168,254,0.12);
  --accent-strong: #4d94ff;
  --border: #28282e;
  --border-light: #35353e;
  --danger: #e85050;
  --danger-dim: rgba(232,80,80,0.12);
  --radius: 6px;
  --radius-lg: 10px;
  --toolbar-h: 44px;
  --sidebar-w: 200px;
  --thumb-size: 160;
  --sb-accent: #6ea8fe;
  --sb-bg: #19191e;
  --sb-text: #d8d8e0;
  --sb-border: #28282e;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 13px; line-height: 1.5;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

/* ── Connection ────────────────────────────────────────── */
#connection-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100dvh; gap: 20px; padding: 24px; text-align: center;
}
#connection-screen h1 { font-size: 22px; font-weight: 600; }
#connection-screen p { color: var(--text-muted); max-width: 360px; font-size: 13px; }

/* ── App ───────────────────────────────────────────────── */
#app { display: none; height: 100dvh; flex-direction: column; }
#app.active { display: flex; }

/* ── Toolbar ───────────────────────────────────────────── */
#toolbar {
  display: flex; align-items: center; gap: 6px;
  height: var(--toolbar-h); min-height: var(--toolbar-h);
  padding: 0 10px; background: var(--bg-raised);
  border-bottom: 1px solid var(--border); z-index: 20;
}
.tb-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border: none; border-radius: var(--radius);
  background: transparent; color: var(--text); cursor: pointer; font-size: 16px;
  transition: background 0.1s; flex-shrink: 0;
}
.tb-btn:hover { background: var(--bg-hover); }
.tb-btn.disabled { opacity: 0.3; pointer-events: none; }

#breadcrumb {
  display: flex; align-items: center; gap: 2px;
  flex: 1; min-width: 0; overflow-x: auto; overflow-y: hidden;
  padding: 0 4px; font-size: 12.5px; white-space: nowrap;
  scrollbar-width: none;
}
#breadcrumb::-webkit-scrollbar { display: none; }
.bc-item {
  padding: 3px 7px; border-radius: 4px; cursor: pointer;
  color: var(--text-muted); transition: all 0.1s; flex-shrink: 0;
}
.bc-item:hover { background: var(--bg-hover); color: var(--text); }
.bc-item.current { color: var(--text); font-weight: 500; cursor: default; }
.bc-item.current:hover { background: transparent; }
.bc-sep { color: var(--border-light); flex-shrink: 0; font-size: 11px; }

#thumb-slider { width: 80px; height: 3px; accent-color: var(--accent); cursor: pointer; opacity: 0.7; }
#thumb-slider:hover { opacity: 1; }
.tb-spacer { width: 1px; height: 20px; background: var(--border); margin: 0 2px; flex-shrink: 0; }

#sort-select {
  background: transparent; border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text-muted);
  font-family: inherit; font-size: 11.5px; padding: 3px 6px;
  cursor: pointer; outline: none; flex-shrink: 0;
}
#sort-select option { background: var(--bg-raised); color: var(--text); }

/* ── Body ──────────────────────────────────────────────── */
#body { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ───────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--bg-raised); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar.hidden { display: none; }
#sidebar-header {
  padding: 10px 12px 6px; font-size: 11px; font-weight: 500;
  color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase;
}
#fav-list { flex: 1; overflow-y: auto; padding: 2px 6px 10px; }
.fav-item {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 8px; border-radius: var(--radius); cursor: pointer;
  font-size: 12.5px; color: var(--text); transition: background 0.1s;
}
.fav-item:hover { background: var(--bg-hover); }
.fav-item.active { background: var(--accent-dim); color: var(--accent); }
.fav-item .fav-icon { font-size: 14px; flex-shrink: 0; }
.fav-item .fav-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fav-item .fav-remove {
  display: none; width: 18px; height: 18px; border: none; border-radius: 3px;
  background: transparent; color: var(--text-muted); cursor: pointer;
  font-size: 12px; align-items: center; justify-content: center;
}
.fav-item:hover .fav-remove { display: flex; }
.fav-item .fav-remove:hover { background: var(--danger-dim); color: var(--danger); }

#sidebar-footer { padding: 8px; border-top: 1px solid var(--border); }
#sidebar-footer button {
  width: 100%; padding: 5px; border: none; border-radius: var(--radius);
  background: transparent; color: var(--text-muted); cursor: pointer;
  font-family: inherit; font-size: 11.5px;
}
#sidebar-footer button:hover { background: var(--bg-hover); color: var(--text); }

/* ── Main ──────────────────────────────────────────────── */
#main { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px; position: relative; }

/* ── Grid ──────────────────────────────────────────────── */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(calc(var(--thumb-size) * 1px), 1fr));
  gap: 4px;
}
.grid-item {
  display: flex; flex-direction: column; align-items: center;
  border-radius: var(--radius); cursor: pointer; padding: 4px;
  transition: background 0.1s;
}
.grid-item:hover { background: var(--bg-hover); }

.grid-thumb {
  width: 100%; aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px; overflow: hidden; background: var(--bg);
  position: relative;
}
.grid-thumb img { max-width: 100%; max-height: 100%; object-fit: contain; }

/* Folder preview: 2x2 mosaic + badge overlay */
.folder-preview {
  display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
  width: 100%; height: 100%; gap: 1px; background: var(--border);
  border-radius: 4px; overflow: hidden; position: relative;
}
.folder-preview .fp-cell {
  background: var(--bg); display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.folder-preview .fp-cell img { width: 100%; height: 100%; object-fit: cover; }
.folder-preview .fp-cell .fp-empty {
  color: var(--text-muted); font-size: 10px; opacity: 0.2;
}
.folder-badge {
  position: absolute; bottom: 3px; right: 3px; z-index: 2;
  width: 30px; height: 30px; border-radius: 6px;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; pointer-events: none;
}

.grid-thumb .folder-icon { font-size: calc(var(--thumb-size) * 0.35px); color: var(--accent); opacity: 0.7; }
.grid-thumb .file-icon { font-size: calc(var(--thumb-size) * 0.22px); color: var(--text-muted); opacity: 0.5; }
.grid-thumb .loading-spinner {
  width: 20px; height: 20px; border: 2px solid var(--border-light);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.grid-name {
  margin-top: 3px; font-size: 11px; text-align: center;
  width: 100%; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; color: var(--text-muted); padding: 0 2px;
}
.grid-item:hover .grid-name { color: var(--text); }

.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 200px; gap: 8px;
  color: var(--text-muted); font-size: 13px;
}
.empty-state .empty-icon { font-size: 36px; opacity: 0.4; }

#loading-overlay {
  display: none; position: absolute; inset: 0;
  background: var(--bg); z-index: 10;
  align-items: center; justify-content: center;
}
#loading-overlay.active { display: flex; }

/* ── Context Menu ──────────────────────────────────────── */
#ctx-menu {
  display: none; position: fixed; z-index: 200;
  background: var(--bg-raised); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px 0;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5); min-width: 160px;
}
#ctx-menu.show { display: block; }
.ctx-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; cursor: pointer; font-size: 12.5px;
  color: var(--text); transition: background 0.08s;
}
.ctx-item:hover { background: var(--bg-hover); }
.ctx-item.danger { color: var(--danger); }
.ctx-item.danger:hover { background: var(--danger-dim); }
.ctx-item .ctx-icon { width: 16px; text-align: center; font-size: 13px; }
.ctx-sep { height: 1px; background: var(--border); margin: 4px 8px; }

/* ── Image Viewer ──────────────────────────────────────── */
#viewer {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: #000; flex-direction: column;
}
#viewer.active { display: flex; }

#viewer-topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 110;
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: linear-gradient(rgba(0,0,0,0.7), transparent);
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
#viewer-topbar.visible { opacity: 1; pointer-events: auto; }
#viewer-title {
  flex: 1; font-size: 13px; color: #fff;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.viewer-btn {
  width: 36px; height: 36px; border: none; border-radius: var(--radius);
  background: rgba(255,255,255,0.1); color: #fff; cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
}
.viewer-btn:hover { background: rgba(255,255,255,0.2); }

#viewer-img-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
#viewer-img { max-width: 100%; max-height: 100%; object-fit: contain; }
#viewer-img.loading { opacity: 0; }

.tap-zone { position: absolute; top: 0; bottom: 0; width: 30%; z-index: 105; cursor: pointer; }
.tap-zone.left { left: 0; }
.tap-zone.right { right: 0; }
.tap-zone.center { left: 30%; width: 40%; cursor: default; }

#viewer-bottombar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 110;
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px; background: linear-gradient(transparent, rgba(0,0,0,0.7));
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
#viewer-bottombar.visible { opacity: 1; pointer-events: auto; }
#viewer-slider { flex: 1; height: 3px; accent-color: var(--accent); cursor: pointer; }
#viewer-page-label { font-size: 12px; color: rgba(255,255,255,0.7); min-width: 60px; text-align: right; }

/* ── Rename Modal ──────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--bg-raised); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px; width: 90%; max-width: 380px;
}
.modal-box h3 { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
.modal-input {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--bg); color: var(--text);
  font-family: inherit; font-size: 13px; outline: none;
}
.modal-input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.modal-btn {
  padding: 6px 16px; border: none; border-radius: var(--radius);
  font-family: inherit; font-size: 13px; cursor: pointer;
}
.modal-btn.primary { background: var(--accent); color: #000; font-weight: 500; }
.modal-btn.primary:hover { background: var(--accent-strong); }
.modal-btn.cancel { background: var(--bg-hover); color: var(--text); }
.modal-btn.cancel:hover { background: var(--bg-selected); }

/* ── Toast ─────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  padding: 8px 18px; border-radius: var(--radius);
  background: var(--bg-raised); border: 1px solid var(--border);
  color: var(--text); font-size: 12.5px; z-index: 500;
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
#toast.show { opacity: 1; }

/* ── Sort Mode ──────────────────────────────────────────── */
#sort-mode-bar {
  display: none; align-items: center; gap: 8px;
  height: 36px; padding: 0 10px; background: var(--accent-dim);
  border-bottom: 1px solid var(--accent); font-size: 12.5px;
}
#sort-mode-bar.active { display: flex; }
#sort-mode-bar .sm-label { color: var(--accent); font-weight: 500; flex-shrink: 0; }
#sort-mode-bar .sm-spacer { flex: 1; }
.sm-btn {
  padding: 4px 12px; border: 1px solid var(--accent); border-radius: var(--radius);
  background: transparent; color: var(--accent); cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 500; transition: all 0.1s;
}
.sm-btn:hover { background: var(--accent); color: #000; }
.sm-btn.danger { border-color: var(--danger); color: var(--danger); }
.sm-btn.danger:hover { background: var(--danger); color: #fff; }

/* Drag styles */
.grid-item.sortable { cursor: grab; }
.grid-item.sortable:active { cursor: grabbing; }
.grid-item.dragging { opacity: 0.3; }
.grid-item.drag-over-before::before,
.grid-item.drag-over-after::after {
  content: ''; position: absolute; top: 4px; bottom: 4px; width: 3px;
  background: var(--accent); border-radius: 2px; z-index: 5;
}
.grid-item.drag-over-before::before { left: -2px; }
.grid-item.drag-over-after::after { right: -2px; }
.grid-item { position: relative; }

/* Touch drag clone */
.touch-drag-clone {
  position: fixed; z-index: 999; pointer-events: none;
  opacity: 0.8; transform: scale(0.9);
  border: 2px solid var(--accent); border-radius: var(--radius);
  background: var(--bg-raised);
}

/* ── Rename Batch Modal ────────────────────────────────── */
#modal-batch-rename .modal-box { max-width: 520px; }
.preset-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.preset-row label { font-size: 12px; color: var(--text-muted); min-width: 70px; }
.preset-select {
  flex: 1; padding: 6px 8px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--bg); color: var(--text);
  font-family: inherit; font-size: 12.5px; outline: none;
}
.preset-select:focus { border-color: var(--accent); }
#prefix-input {
  width: 120px; padding: 6px 8px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--bg); color: var(--text);
  font-family: inherit; font-size: 12.5px; outline: none;
}
#prefix-input:focus { border-color: var(--accent); }
#prefix-row { display: none; }
#prefix-row.show { display: flex; }

#rename-preview {
  max-height: 240px; overflow-y: auto; margin: 10px 0;
  border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 11.5px;
}
.rp-row {
  display: flex; padding: 4px 10px; gap: 8px;
  border-bottom: 1px solid var(--border);
}
.rp-row:last-child { border-bottom: none; }
.rp-old { flex: 1; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rp-arrow { color: var(--accent); flex-shrink: 0; }
.rp-new { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Responsive ────────────────────────────────────────── */
@media (max-width: 700px) {
  #sidebar { display: none; }
  #sidebar.mobile-open {
    display: flex !important; position: fixed; top: var(--toolbar-h); left: 0; bottom: 0;
    z-index: 50; box-shadow: 4px 0 20px rgba(0,0,0,0.5);
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    border-right: 1px solid var(--border);
  }
  #main { padding: 6px; }
}
</style>
</head>
<body>

<div id="connection-screen">
  <h1>Dropbox Filer</h1>
  <p>Dropbox上のファイルをブラウズ・管理するファイラー</p>
  <div id="dbx-ui"></div>
</div>

<div id="app">
  <div id="toolbar">
    <button class="tb-btn" id="btn-sidebar" title="サイドバー">☰</button>
    <button class="tb-btn" id="btn-back" title="戻る">←</button>
    <button class="tb-btn" id="btn-forward" title="進む">→</button>
    <button class="tb-btn" id="btn-up" title="上のフォルダ">↑</button>
    <div id="breadcrumb"></div>
    <select id="sort-select">
      <option value="name_asc">名前 ↑</option>
      <option value="name_desc">名前 ↓</option>
      <option value="date_desc">更新日 ↓</option>
      <option value="date_asc">更新日 ↑</option>
      <option value="size_desc">サイズ ↓</option>
      <option value="size_asc">サイズ ↑</option>
    </select>
    <div class="tb-spacer"></div>
    <input type="range" id="thumb-slider" min="80" max="320" value="160" title="サムネサイズ">
    <div class="tb-spacer"></div>
    <button class="tb-btn" id="btn-sort-mode" title="並び替えモード">⇅</button>
    <button class="tb-btn" id="btn-undo" title="リネームを元に戻す" style="display:none">↩</button>
    <button class="tb-btn" id="btn-refresh" title="更新">⟳</button>
    <button class="tb-btn" id="btn-disconnect" title="切断">⏻</button>
  </div>
  <div id="sort-mode-bar">
    <span class="sm-label">⇅ 並び替えモード</span>
    <span class="sm-spacer"></span>
    <button class="sm-btn" id="btn-rename-exec">リネーム実行</button>
    <button class="sm-btn" id="btn-sort-reset">元に戻す</button>
    <button class="sm-btn danger" id="btn-sort-cancel">終了</button>
  </div>
  <div id="body">
    <div id="sidebar">
      <div id="sidebar-header">お気に入り</div>
      <div id="fav-list"></div>
      <div id="sidebar-footer"><button id="btn-add-fav">＋ 現在のフォルダを追加</button></div>
    </div>
    <div id="main">
      <div id="loading-overlay"><div class="loading-spinner" style="width:28px;height:28px;border:3px solid var(--border-light);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite"></div></div>
      <div id="grid"></div>
    </div>
  </div>
</div>

<div id="viewer">
  <div id="viewer-topbar">
    <span id="viewer-title"></span>
    <button class="viewer-btn" id="viewer-close" title="閉じる">✕</button>
  </div>
  <div id="viewer-img-wrap">
    <div class="tap-zone left" id="tap-left"></div>
    <div class="tap-zone center" id="tap-center"></div>
    <div class="tap-zone right" id="tap-right"></div>
    <img id="viewer-img" src="" alt="">
  </div>
  <div id="viewer-bottombar">
    <input type="range" id="viewer-slider" min="0" max="0" value="0">
    <span id="viewer-page-label"></span>
  </div>
</div>

<div id="ctx-menu"></div>

<div class="modal-overlay" id="modal-rename">
  <div class="modal-box">
    <h3>名前の変更</h3>
    <input class="modal-input" id="rename-input" type="text" autocomplete="off">
    <div class="modal-actions">
      <button class="modal-btn cancel" id="rename-cancel">キャンセル</button>
      <button class="modal-btn primary" id="rename-ok">変更</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<div class="modal-overlay" id="modal-batch-rename">
  <div class="modal-box">
    <h3>連番リネーム</h3>
    <div class="preset-row">
      <label>プリセット</label>
      <select class="preset-select" id="preset-select">
        <option value="nnn">番号のみ（3桁）: 001.ext</option>
        <option value="nn">番号のみ（2桁）: 01.ext</option>
        <option value="prefix_nnn">プレフィックス+番号: prefix_001.ext</option>
        <option value="custom">カスタム</option>
      </select>
    </div>
    <div class="preset-row" id="prefix-row">
      <label>プレフィックス</label>
      <input type="text" id="prefix-input" placeholder="例: ネーム" autocomplete="off">
    </div>
    <div class="preset-row" id="custom-row" style="display:none">
      <label>パターン</label>
      <input type="text" id="custom-input" class="preset-select" placeholder="{NNN}.{ext}" autocomplete="off">
    </div>
    <div id="rename-preview"></div>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="batch-cancel">キャンセル</button>
      <button class="modal-btn primary" id="batch-exec">実行</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ════════════════════════════════════════
// State
// ════════════════════════════════════════
const App = {
  storage: null,
  currentPath: '',
  entries: [],
  favorites: [],
  thumbCache: {},       // cacheKey → objectURL (file thumbs)
  folderPreviews: {},   // folderPath → [url, url, ...]
  sortMode: 'name_asc',
  thumbSize: 160,
  // Viewer
  viewerImages: [],
  viewerIndex: 0,
  viewerVisible: false,
  toolbarTimer: null,
  prefetchCache: {},    // relativePath → objectURL
  // Navigation
  navGen: 0,            // incremented on each navigate, to discard stale loads
  // Phase 2: Sort mode
  sortModeActive: false,
  sortedFiles: [],      // reordered file entries (files only, not folders)
  originalFiles: [],    // original order backup for reset
  undoHistory: null,    // { entries: [{from, to}] } for undo after rename
};

const THUMB_EXT = new Set(['jpg','jpeg','png','gif','webp','bmp','tiff','tif','ppm']);
const IMG_EXT = new Set(['jpg','jpeg','png','gif','webp','bmp','tiff','tif','svg']);

// ════════════════════════════════════════
// Natural Sort
// ════════════════════════════════════════
function naturalCmp(a, b) {
  const an = natChunks(a), bn = natChunks(b);
  const len = Math.min(an.length, bn.length);
  for (let i = 0; i < len; i++) {
    const ac = an[i], bc = bn[i];
    if (ac.n !== null && bc.n !== null) {
      if (ac.n !== bc.n) return ac.n - bc.n;
    } else if (ac.n !== null) {
      return -1; // numbers before text
    } else if (bc.n !== null) {
      return 1;
    } else {
      const c = ac.s.localeCompare(bc.s, 'ja', { sensitivity: 'base' });
      if (c !== 0) return c;
    }
  }
  return an.length - bn.length;
}

function natChunks(str) {
  const res = [];
  const re = /(\d+)|(\D+)/g;
  let m;
  while ((m = re.exec(str)) !== null) {
    if (m[1] !== undefined) {
      res.push({ n: parseInt(m[1], 10), s: m[1] });
    } else {
      res.push({ n: null, s: m[2] });
    }
  }
  return res;
}

// ════════════════════════════════════════
// IndexedDB
// ════════════════════════════════════════
const IDB = {
  db: null,
  async open() {
    return new Promise((res, rej) => {
      const r = indexedDB.open('DropboxFiler', 2);
      r.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('thumbs')) db.createObjectStore('thumbs');
        if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings');
        if (!db.objectStoreNames.contains('folderPreviews')) db.createObjectStore('folderPreviews');
      };
      r.onsuccess = (e) => { IDB.db = e.target.result; res(); };
      r.onerror = () => rej(r.error);
    });
  },
  async get(store, key) {
    return new Promise((res) => {
      try {
        const tx = IDB.db.transaction(store, 'readonly');
        const r = tx.objectStore(store).get(key);
        r.onsuccess = () => res(r.result);
        r.onerror = () => res(undefined);
      } catch(_) { res(undefined); }
    });
  },
  async put(store, key, value) {
    return new Promise((res) => {
      try {
        const tx = IDB.db.transaction(store, 'readwrite');
        tx.objectStore(store).put(value, key);
        tx.oncomplete = () => res();
        tx.onerror = () => res();
      } catch(_) { res(); }
    });
  },
};

// ════════════════════════════════════════
// Dropbox Thumbnail API
// ════════════════════════════════════════
function dbxArg(obj) {
  return JSON.stringify(obj).replace(/[\u0080-\uFFFF]/g,
    c => '\\u' + c.charCodeAt(0).toString(16).padStart(4, '0'));
}

async function fetchThumbnail(absPath, size) {
  const token = App.storage.getToken();
  const r = await fetch('https://content.dropboxapi.com/2/files/get_thumbnail_v2', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Dropbox-API-Arg': dbxArg({
        resource: { '.tag': 'path', path: absPath },
        format: 'jpeg', size: size || 'w256h256', mode: 'bestfit',
      }),
    },
  });
  if (!r.ok) throw new Error(r.status);
  return r.blob();
}

// ════════════════════════════════════════
// Helpers
// ════════════════════════════════════════
const $ = s => document.querySelector(s);
function ext(n) { const i = n.lastIndexOf('.'); return i > 0 ? n.slice(i+1).toLowerCase() : ''; }
function baseName(p) { return p.split('/').pop(); }
function parentPath(p) { const a = p.split('/'); a.pop(); return a.join('/'); }

function toast(msg) {
  const el = $('#toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2200);
}

function entryRelPath(entry) {
  // path_display is like "/FolderA/SubB/file.jpg" → strip leading "/"
  const abs = entry.path_display || entry.path_lower || '';
  return abs.startsWith('/') ? abs.slice(1) : abs;
}

// ════════════════════════════════════════
// Thumbnail Queue (shared for files + folder previews)
// ════════════════════════════════════════
const TQ = { running: 0, max: 6, q: [] };
function tqRun(fn) {
  return new Promise((resolve, reject) => {
    const exec = () => {
      TQ.running++;
      fn().then(resolve, reject).finally(() => {
        TQ.running--;
        if (TQ.q.length) TQ.q.shift()();
      });
    };
    if (TQ.running < TQ.max) exec();
    else TQ.q.push(exec);
  });
}

// ════════════════════════════════════════
// Init
// ════════════════════════════════════════
async function init() {
  await IDB.open();

  const st = await IDB.get('settings', 'thumbSize');
  if (st) { App.thumbSize = st; $('#thumb-slider').value = st; document.documentElement.style.setProperty('--thumb-size', st); }
  const ss = await IDB.get('settings', 'sortMode');
  if (ss) { App.sortMode = ss; $('#sort-select').value = ss; }
  const sf = await IDB.get('settings', 'favorites');
  if (sf) App.favorites = sf;
  const sp = await IDB.get('settings', 'lastPath');
  const sbHidden = await IDB.get('settings', 'sidebarHidden');
  if (sbHidden) document.getElementById('sidebar').classList.add('hidden');

  App.storage = new StorageBridge({ basePath: '', storagePrefix: 'dbxfiler', ui: true, uiTarget: '#dbx-ui' });

  App.storage.on('connected', async () => {
    $('#connection-screen').style.display = 'none';
    $('#app').classList.add('active');
    renderFavorites();
    const startPath = pathFromHash() ?? sp ?? '';
    await navigate(startPath, true);
  });
  App.storage.on('disconnected', () => {
    $('#connection-screen').style.display = '';
    $('#app').classList.remove('active');
  });

  if (App.storage.isConnected) {
    $('#connection-screen').style.display = 'none';
    $('#app').classList.add('active');
    renderFavorites();
    const startPath = pathFromHash() ?? sp ?? '';
    navigate(startPath, true);
  }

  setupEvents();
}

// ════════════════════════════════════════
// History API — folder path stored in hash
// ════════════════════════════════════════
function pathFromHash() {
  const h = location.hash;
  if (!h || h === '#') return null;
  try { return decodeURIComponent(h.slice(1)); } catch(_) { return null; }
}

function pushHash(path) {
  const newHash = '#' + encodeURIComponent(path);
  if (location.hash !== newHash) {
    history.pushState(null, '', newHash);
  }
}

function replaceHash(path) {
  history.replaceState(null, '', '#' + encodeURIComponent(path));
}

// ════════════════════════════════════════
// Navigation
// ════════════════════════════════════════
async function navigate(path, replace) {
  path = (path || '').replace(/^\/+|\/+$/g, '');
  App.currentPath = path;
  IDB.put('settings', 'lastPath', path);
  replace ? replaceHash(path) : pushHash(path);
  updateNavButtons();
  renderBreadcrumb();
  renderFavorites();
  await loadFolder(path);
}

async function loadFolder(path) {
  const gen = ++App.navGen;
  const grid = $('#grid');
  const loading = $('#loading-overlay');

  // Clear immediately to prevent stale thumbnails
  grid.innerHTML = '';
  loading.classList.add('active');

  try {
    const entries = await App.storage.list(path || '');
    if (gen !== App.navGen) return; // stale
    App.entries = sortEntries(entries);
    renderGrid(gen);
  } catch (e) {
    if (gen !== App.navGen) return;
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">⚠</div><div>読み込みエラー</div></div>';
  } finally {
    if (gen === App.navGen) loading.classList.remove('active');
  }
}

function sortEntries(entries) {
  const folders = entries.filter(e => e['.tag'] === 'folder');
  const files = entries.filter(e => e['.tag'] === 'file');
  const cmp = (a, b) => {
    switch (App.sortMode) {
      case 'name_asc': return naturalCmp(a.name, b.name);
      case 'name_desc': return naturalCmp(b.name, a.name);
      case 'date_desc': return (b.client_modified || '').localeCompare(a.client_modified || '');
      case 'date_asc': return (a.client_modified || '').localeCompare(b.client_modified || '');
      case 'size_desc': return (b.size || 0) - (a.size || 0);
      case 'size_asc': return (a.size || 0) - (b.size || 0);
      default: return 0;
    }
  };
  folders.sort((a, b) => naturalCmp(a.name, b.name));
  files.sort(cmp);
  return [...folders, ...files];
}

function updateNavButtons() {
  $('#btn-up').classList.toggle('disabled', !App.currentPath);
}

// ════════════════════════════════════════
// Breadcrumb
// ════════════════════════════════════════
function renderBreadcrumb() {
  const bc = $('#breadcrumb');
  const parts = App.currentPath ? App.currentPath.split('/') : [];
  let html = `<span class="bc-item${!parts.length ? ' current' : ''}" data-path="">Dropbox</span>`;
  let acc = '';
  for (let i = 0; i < parts.length; i++) {
    acc += (acc ? '/' : '') + parts[i];
    html += `<span class="bc-sep">›</span><span class="bc-item${i === parts.length-1 ? ' current' : ''}" data-path="${acc}">${parts[i]}</span>`;
  }
  bc.innerHTML = html;
  bc.scrollLeft = bc.scrollWidth;
}

// ════════════════════════════════════════
// Grid
// ════════════════════════════════════════
function renderGrid(gen) {
  const grid = $('#grid');
  const entries = App.entries;
  if (!entries.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📂</div><div>空のフォルダ</div></div>';
    return;
  }
  grid.innerHTML = entries.map((entry, idx) => {
    const isFolder = entry['.tag'] === 'folder';
    const e = ext(entry.name);
    if (isFolder) {
      return `<div class="grid-item" data-index="${idx}" data-tag="folder">
        <div class="grid-thumb" id="thumb-${idx}"><span class="folder-icon">📁</span></div>
        <div class="grid-name" title="${entry.name}">${entry.name}</div>
      </div>`;
    }
    return `<div class="grid-item" data-index="${idx}" data-tag="file">
      <div class="grid-thumb" id="thumb-${idx}">
        ${THUMB_EXT.has(e) ? '<div class="loading-spinner"></div>' : '<span class="file-icon">📄</span>'}
      </div>
      <div class="grid-name" title="${entry.name}">${entry.name}</div>
    </div>`;
  }).join('');

  setupObserver(gen);
  loadFolderPreviews(gen);
}

// ════════════════════════════════════════
// File Thumbnail (Intersection Observer)
// ════════════════════════════════════════
let observer = null;
function setupObserver(gen) {
  if (observer) observer.disconnect();
  observer = new IntersectionObserver((ios) => {
    for (const io of ios) {
      if (io.isIntersecting) {
        loadThumb(parseInt(io.target.dataset.index), gen);
        observer.unobserve(io.target);
      }
    }
  }, { root: $('#main'), rootMargin: '300px' });
  document.querySelectorAll('.grid-item[data-tag="file"]').forEach(el => {
    const idx = parseInt(el.dataset.index);
    const entry = App.entries[idx];
    if (entry && THUMB_EXT.has(ext(entry.name))) observer.observe(el);
  });
}

async function loadThumb(idx, gen) {
  const entry = App.entries[idx];
  if (!entry) return;
  const absPath = entry.path_lower;
  const cacheKey = absPath + ':' + (entry.content_hash || '');

  // Memory cache
  if (App.thumbCache[cacheKey]) {
    setThumbImg(idx, gen, App.thumbCache[cacheKey]);
    return;
  }
  // IDB cache
  const cached = await IDB.get('thumbs', cacheKey);
  if (cached) {
    const url = URL.createObjectURL(new Blob([cached], { type: 'image/jpeg' }));
    App.thumbCache[cacheKey] = url;
    setThumbImg(idx, gen, url);
    return;
  }
  // Fetch via queue
  tqRun(async () => {
    const blob = await fetchThumbnail(entry.path_display || absPath);
    const buf = await blob.arrayBuffer();
    const url = URL.createObjectURL(new Blob([buf], { type: 'image/jpeg' }));
    App.thumbCache[cacheKey] = url;
    IDB.put('thumbs', cacheKey, buf);
    setThumbImg(idx, gen, url);
  }).catch(() => {
    if (gen === App.navGen) {
      const el = document.getElementById('thumb-' + idx);
      if (el) el.innerHTML = '<span class="file-icon">🖼</span>';
    }
  });
}

function setThumbImg(idx, gen, url) {
  if (gen !== App.navGen) return;
  const el = document.getElementById('thumb-' + idx);
  if (el) el.innerHTML = `<img src="${url}" alt="">`;
}

// ════════════════════════════════════════
// Folder Preview Thumbnails
// ════════════════════════════════════════
async function loadFolderPreviews(gen) {
  const folderEntries = App.entries
    .map((e, i) => ({ entry: e, idx: i }))
    .filter(x => x.entry['.tag'] === 'folder');

  for (const { entry, idx } of folderEntries) {
    if (gen !== App.navGen) return;
    const folderRel = entryRelPath(entry);

    // Check IDB cache for this folder
    const cached = await IDB.get('folderPreviews', entry.path_lower);
    if (cached && cached.length > 0) {
      renderFolderPreview(idx, gen, cached);
      continue;
    }

    // Fire and forget — don't await per folder, use queue
    loadOneFolderPreview(entry, idx, gen, folderRel);
  }
}

async function loadOneFolderPreview(entry, idx, gen, folderRel) {
  try {
    const children = await App.storage.list(folderRel);
    if (gen !== App.navGen) return;
    const images = children.filter(c => c['.tag'] === 'file' && THUMB_EXT.has(ext(c.name)));
    if (!images.length) return;

    const toFetch = images.slice(0, 4);
    const urls = [];
    for (const img of toFetch) {
      if (gen !== App.navGen) return;
      try {
        const blob = await tqRun(() => fetchThumbnail(img.path_display || img.path_lower, 'w128h128'));
        urls.push(URL.createObjectURL(blob));
      } catch(_) {}
    }
    if (urls.length && gen === App.navGen) {
      const bufs = [];
      for (const url of urls) {
        try { bufs.push(await (await fetch(url)).arrayBuffer()); } catch(_) {}
      }
      if (bufs.length) IDB.put('folderPreviews', entry.path_lower, bufs);
      renderFolderPreview(idx, gen, urls);
    }
  } catch(_) {}
}

function renderFolderPreview(idx, gen, urlsOrBufs) {
  if (gen !== App.navGen) return;
  const el = document.getElementById('thumb-' + idx);
  if (!el) return;
  const urls = urlsOrBufs.map(u =>
    typeof u === 'string' ? u : URL.createObjectURL(new Blob([u], { type: 'image/jpeg' }))
  );
  let cells = '';
  for (let i = 0; i < 4; i++) {
    cells += urls[i]
      ? `<div class="fp-cell"><img src="${urls[i]}" alt=""></div>`
      : `<div class="fp-cell"><span class="fp-empty">·</span></div>`;
  }
  el.innerHTML = `<div class="folder-preview">${cells}<div class="folder-badge">📁</div></div>`;
}

// ════════════════════════════════════════
// Favorites
// ════════════════════════════════════════
function renderFavorites() {
  const list = $('#fav-list');
  if (!App.favorites.length) {
    list.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:11.5px;text-align:center">お気に入りなし</div>';
    return;
  }
  list.innerHTML = App.favorites.map((f, i) => `
    <div class="fav-item${App.currentPath === f.path ? ' active' : ''}" data-path="${f.path}" data-index="${i}">
      <span class="fav-icon">📁</span>
      <span class="fav-name" title="${f.path || 'ルート'}">${f.name}</span>
      <button class="fav-remove" data-index="${i}" title="削除">✕</button>
    </div>`).join('');
}
function addFavorite(path) {
  if (App.favorites.some(f => f.path === path)) { toast('追加済みです'); return; }
  App.favorites.push({ path, name: path ? baseName(path) : 'ルート' });
  IDB.put('settings', 'favorites', App.favorites);
  renderFavorites(); toast('お気に入りに追加');
}
function removeFavorite(i) {
  App.favorites.splice(i, 1);
  IDB.put('settings', 'favorites', App.favorites);
  renderFavorites();
}

// ════════════════════════════════════════
// Context Menu
// ════════════════════════════════════════
let ctxTarget = null;
function showCtx(x, y, entry) {
  ctxTarget = entry;
  const m = $('#ctx-menu');
  const isF = entry['.tag'] === 'folder';
  const e = ext(entry.name);
  let h = '';
  if (isF) {
    h += '<div class="ctx-item" data-action="open"><span class="ctx-icon">📂</span>開く</div>';
    h += '<div class="ctx-item" data-action="fav"><span class="ctx-icon">⭐</span>お気に入りに追加</div>';
    h += '<div class="ctx-sep"></div>';
  } else if (IMG_EXT.has(e)) {
    h += '<div class="ctx-item" data-action="view"><span class="ctx-icon">🖼</span>画像を開く</div>';
    h += '<div class="ctx-sep"></div>';
  }
  h += '<div class="ctx-item" data-action="rename"><span class="ctx-icon">✏</span>名前の変更</div>';
  h += '<div class="ctx-item danger" data-action="delete"><span class="ctx-icon">🗑</span>削除</div>';
  m.innerHTML = h;
  m.style.left = Math.min(x, innerWidth - 180) + 'px';
  m.style.top = Math.min(y, innerHeight - 200) + 'px';
  m.classList.add('show');
}
function hideCtx() { $('#ctx-menu').classList.remove('show'); ctxTarget = null; }

async function doCtx(action) {
  if (!ctxTarget) return;
  const entry = ctxTarget; hideCtx();
  const rel = entryRelPath(entry);
  if (action === 'open') navigate(rel);
  else if (action === 'view') openViewer(entry);
  else if (action === 'fav') addFavorite(rel);
  else if (action === 'rename') showRenameModal(entry);
  else if (action === 'delete') await deleteEntry(entry);
}

// ════════════════════════════════════════
// Rename / Delete
// ════════════════════════════════════════
let renameTarget = null;
function showRenameModal(entry) {
  renameTarget = entry;
  const inp = $('#rename-input');
  inp.value = entry['.tag'] === 'folder' ? entry.name : entry.name.replace(/\.[^.]+$/, '');
  $('#modal-rename').classList.add('show');
  setTimeout(() => { inp.focus(); inp.select(); }, 50);
}
async function execRename() {
  if (!renameTarget) return;
  const entry = renameTarget;
  const raw = $('#rename-input').value.trim();
  if (!raw) return;
  const e = ext(entry.name);
  const fin = (entry['.tag'] === 'file' && e) ? raw + '.' + e : raw;
  if (fin === entry.name) { $('#modal-rename').classList.remove('show'); return; }
  const rel = entryRelPath(entry);
  const par = parentPath(rel);
  const newRel = par ? par + '/' + fin : fin;
  try {
    await App.storage.move(rel, newRel);
    toast('名前を変更しました');
    $('#modal-rename').classList.remove('show');
    loadFolder(App.currentPath);
  } catch(e) { toast('エラー: ' + e.message); }
}
async function deleteEntry(entry) {
  if (!confirm(`「${entry.name}」を削除しますか？`)) return;
  try {
    await App.storage.delete(entryRelPath(entry));
    toast('削除しました');
    loadFolder(App.currentPath);
  } catch(e) { toast('削除エラー: ' + e.message); }
}

// ════════════════════════════════════════
// Phase 2: Sort Mode & Batch Rename
// ════════════════════════════════════════
function enterSortMode() {
  if (App.sortModeActive) return;
  App.sortModeActive = true;
  // Separate folders and files — only files are reorderable
  const folders = App.entries.filter(e => e['.tag'] === 'folder');
  const files = App.entries.filter(e => e['.tag'] === 'file');
  App.originalFiles = [...files];
  App.sortedFiles = [...files];
  App.undoHistory = null;
  $('#sort-mode-bar').classList.add('active');
  // Re-render with drag handles
  renderSortableGrid();
}

function exitSortMode() {
  App.sortModeActive = false;
  App.sortedFiles = [];
  App.originalFiles = [];
  $('#sort-mode-bar').classList.remove('active');
  // Reload from Dropbox to restore proper entries
  loadFolder(App.currentPath);
}

function resetSortOrder() {
  App.sortedFiles = [...App.originalFiles];
  renderSortableGrid();
  toast('並び順をリセットしました');
}

function renderSortableGrid() {
  const grid = $('#grid');
  const folders = App.entries.filter(e => e['.tag'] === 'folder');
  const files = App.sortedFiles;
  const all = [...folders, ...files];

  // Update App.entries so thumb loading uses correct indices
  App.entries = all;

  grid.innerHTML = all.map((entry, idx) => {
    const isFolder = entry['.tag'] === 'folder';
    const e = ext(entry.name);
    const isFile = !isFolder;
    return `<div class="grid-item${isFile ? ' sortable' : ''}" data-index="${idx}" data-tag="${entry['.tag']}" ${isFile ? 'draggable="true"' : ''}>
      <div class="grid-thumb" id="thumb-${idx}">
        ${isFolder ? '<span class="folder-icon">📁</span>'
          : (THUMB_EXT.has(e) ? '<div class="loading-spinner"></div>' : '<span class="file-icon">📄</span>')}
      </div>
      <div class="grid-name" title="${entry.name}">${entry.name}</div>
    </div>`;
  }).join('');

  const gen = App.navGen;
  setupObserver(gen);
  loadFolderPreviews(gen);

  setupDragReorder(folders.length);
}

// ── D&D Reorder (desktop: HTML5, mobile: touch) ──
let dragSrcIdx = null;

function setupDragReorder(folderCount) {
  // Store folderCount for event delegation (set fresh each render)
  App._sortFolderCount = folderCount;
}

// Called once in setupEvents — all D&D via event delegation
function initDragReorder() {
  const grid = $('#grid');

  // ── HTML5 DnD (desktop) ──
  grid.addEventListener('dragstart', e => {
    if (!App.sortModeActive) return;
    const item = e.target.closest('.grid-item.sortable');
    if (!item) { e.preventDefault(); return; }
    dragSrcIdx = parseInt(item.dataset.index) - App._sortFolderCount;
    item.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
  });
  grid.addEventListener('dragend', e => {
    const item = e.target.closest('.grid-item');
    if (item) item.classList.remove('dragging');
    document.querySelectorAll('.drag-over-before,.drag-over-after').forEach(el => {
      el.classList.remove('drag-over-before', 'drag-over-after');
    });
    dragSrcIdx = null;
  });
  grid.addEventListener('dragover', e => {
    if (!App.sortModeActive || dragSrcIdx === null) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const item = e.target.closest('.grid-item.sortable');
    if (!item) return;
    document.querySelectorAll('.drag-over-before,.drag-over-after').forEach(el => {
      el.classList.remove('drag-over-before', 'drag-over-after');
    });
    const rect = item.getBoundingClientRect();
    const mid = rect.left + rect.width / 2;
    if (e.clientX < mid) item.classList.add('drag-over-before');
    else item.classList.add('drag-over-after');
  });
  grid.addEventListener('drop', e => {
    if (!App.sortModeActive || dragSrcIdx === null) return;
    e.preventDefault();
    const item = e.target.closest('.grid-item.sortable');
    if (!item) return;
    const dropIdx = parseInt(item.dataset.index) - App._sortFolderCount;
    if (dropIdx === dragSrcIdx) return;
    const rect = item.getBoundingClientRect();
    const mid = rect.left + rect.width / 2;
    reorderFiles(dragSrcIdx, dropIdx, e.clientX < mid);
    document.querySelectorAll('.drag-over-before,.drag-over-after').forEach(el => {
      el.classList.remove('drag-over-before', 'drag-over-after');
    });
  });

  // ── Touch DnD (mobile) ──
  let touchSrcIdx = null, touchClone = null, touchLP = null;

  grid.addEventListener('touchstart', e => {
    if (!App.sortModeActive) return;
    const item = e.target.closest('.grid-item.sortable');
    if (!item) return;
    touchLP = setTimeout(() => {
      touchSrcIdx = parseInt(item.dataset.index) - App._sortFolderCount;
      item.classList.add('dragging');
      touchClone = item.cloneNode(true);
      touchClone.className = 'touch-drag-clone';
      touchClone.style.width = item.offsetWidth + 'px';
      touchClone.style.height = item.offsetHeight + 'px';
      document.body.appendChild(touchClone);
      posClone(e.touches[0]);
    }, 400);
  }, { passive: true });

  grid.addEventListener('touchmove', e => {
    if (touchClone) {
      e.preventDefault();
      posClone(e.touches[0]);
      document.querySelectorAll('.drag-over-before,.drag-over-after').forEach(el => {
        el.classList.remove('drag-over-before', 'drag-over-after');
      });
      const under = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
      const item = under?.closest('.grid-item.sortable');
      if (item) {
        const rect = item.getBoundingClientRect();
        if (e.touches[0].clientX < rect.left + rect.width / 2) item.classList.add('drag-over-before');
        else item.classList.add('drag-over-after');
      }
    } else {
      clearTimeout(touchLP);
    }
  }, { passive: false });

  grid.addEventListener('touchend', e => {
    clearTimeout(touchLP);
    if (touchClone && touchSrcIdx !== null) {
      const under = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      const item = under?.closest('.grid-item.sortable');
      if (item) {
        const dropIdx = parseInt(item.dataset.index) - App._sortFolderCount;
        if (dropIdx !== touchSrcIdx) {
          const rect = item.getBoundingClientRect();
          reorderFiles(touchSrcIdx, dropIdx, e.changedTouches[0].clientX < rect.left + rect.width / 2);
        }
      }
      touchClone.remove(); touchClone = null;
      document.querySelectorAll('.dragging,.drag-over-before,.drag-over-after').forEach(el => {
        el.classList.remove('dragging', 'drag-over-before', 'drag-over-after');
      });
      touchSrcIdx = null;
    }
  });

  function posClone(t) { if (touchClone) { touchClone.style.left = (t.clientX - 40) + 'px'; touchClone.style.top = (t.clientY - 40) + 'px'; } }
}

function reorderFiles(fromIdx, toIdx, before) {
  const item = App.sortedFiles.splice(fromIdx, 1)[0];
  let insertAt = toIdx;
  if (fromIdx < toIdx) insertAt--;
  if (!before) insertAt++;
  App.sortedFiles.splice(insertAt, 0, item);
  renderSortableGrid();
}

// ── Batch Rename ──
function openBatchRename() {
  if (!App.sortedFiles.length) { toast('ファイルがありません'); return; }
  $('#preset-select').value = 'nnn';
  $('#prefix-input').value = '';
  $('#custom-input').value = '';
  $('#prefix-row').classList.remove('show');
  $('#custom-row').style.display = 'none';
  updateRenamePreview();
  $('#modal-batch-rename').classList.add('show');
}

function updateRenamePreview() {
  const files = App.sortedFiles;
  const preset = $('#preset-select').value;
  const prefix = $('#prefix-input').value.trim();
  const customPat = $('#custom-input').value.trim();
  const preview = $('#rename-preview');

  const newNames = files.map((f, i) => {
    const e = ext(f.name);
    const num = i + 1;
    switch (preset) {
      case 'nnn': return pad(num, 3) + (e ? '.' + e : '');
      case 'nn': return pad(num, 2) + (e ? '.' + e : '');
      case 'prefix_nnn': return (prefix || 'file') + '_' + pad(num, 3) + (e ? '.' + e : '');
      case 'custom': return applyCustom(customPat, num, e, f.name);
      default: return f.name;
    }
  });

  preview.innerHTML = files.map((f, i) => `
    <div class="rp-row">
      <span class="rp-old">${f.name}</span>
      <span class="rp-arrow">→</span>
      <span class="rp-new">${newNames[i]}</span>
    </div>
  `).join('');
}

function pad(n, digits) {
  return String(n).padStart(digits, '0');
}

function applyCustom(pattern, num, e, origName) {
  if (!pattern) return origName;
  return pattern
    .replace('{NNN}', pad(num, 3))
    .replace('{NN}', pad(num, 2))
    .replace('{N}', String(num))
    .replace('{ext}', e)
    .replace('{name}', origName.replace(/\.[^.]+$/, ''));
}

async function executeBatchRename() {
  const files = App.sortedFiles;
  const preset = $('#preset-select').value;
  const prefix = $('#prefix-input').value.trim();
  const customPat = $('#custom-input').value.trim();

  const newNames = files.map((f, i) => {
    const e = ext(f.name);
    const num = i + 1;
    switch (preset) {
      case 'nnn': return pad(num, 3) + (e ? '.' + e : '');
      case 'nn': return pad(num, 2) + (e ? '.' + e : '');
      case 'prefix_nnn': return (prefix || 'file') + '_' + pad(num, 3) + (e ? '.' + e : '');
      case 'custom': return applyCustom(customPat, num, e, f.name);
      default: return f.name;
    }
  });

  // Check if any renames needed
  const renames = [];
  for (let i = 0; i < files.length; i++) {
    if (files[i].name !== newNames[i]) {
      renames.push({ entry: files[i], newName: newNames[i] });
    }
  }
  if (!renames.length) { toast('変更なし'); return; }

  if (!confirm(`${renames.length}件のファイルをリネームしますか？`)) return;

  $('#modal-batch-rename').classList.remove('show');
  toast('リネーム中...');

  // 2-pass rename to avoid collisions
  // Pass 1: rename to temp names
  const tempPrefix = '__filer_tmp_';
  const undoEntries = [];
  let failCount = 0;

  try {
    for (let i = 0; i < renames.length; i++) {
      const r = renames[i];
      const rel = entryRelPath(r.entry);
      const par = parentPath(rel);
      const tempName = tempPrefix + i + '_' + r.newName;
      const tempRel = par ? par + '/' + tempName : tempName;
      try {
        await App.storage.move(rel, tempRel);
        renames[i]._tempRel = tempRel;
        undoEntries.push({ from: tempRel, origRel: rel, newName: r.newName });
      } catch(e) {
        console.error('Rename pass 1 failed:', r.entry.name, e);
        failCount++;
        renames[i]._tempRel = null;
      }
    }

    // Pass 2: rename from temp to final
    for (let i = 0; i < renames.length; i++) {
      if (!renames[i]._tempRel) continue;
      const rel = renames[i]._tempRel;
      const par = parentPath(rel);
      const finalRel = par ? par + '/' + renames[i].newName : renames[i].newName;
      try {
        await App.storage.move(rel, finalRel);
        undoEntries[i].finalRel = finalRel;
      } catch(e) {
        console.error('Rename pass 2 failed:', renames[i].newName, e);
        failCount++;
      }
    }

    // Store undo info
    App.undoHistory = {
      entries: undoEntries.filter(u => u.finalRel).map(u => ({
        from: u.finalRel,
        to: u.origRel,
      })),
    };

    if (failCount > 0) {
      toast(`完了（${failCount}件エラー）`);
    } else {
      toast(`${renames.length}件リネーム完了`);
    }
  } catch(e) {
    toast('リネームエラー: ' + e.message);
  }

  exitSortMode();
  loadFolder(App.currentPath);
  updateUndoBtn();
}

function updateUndoBtn() {
  $('#btn-undo').style.display = (App.undoHistory && App.undoHistory.entries.length) ? '' : 'none';
}

async function undoRename() {
  if (!App.undoHistory || !App.undoHistory.entries.length) {
    toast('元に戻す操作がありません');
    return;
  }
  if (!confirm(`${App.undoHistory.entries.length}件のリネームを元に戻しますか？`)) return;

  toast('元に戻しています...');
  let failCount = 0;

  // Reverse: move from final name back to original
  // Also 2-pass to avoid collision
  const entries = App.undoHistory.entries;
  const tempPrefix = '__filer_undo_';

  // Pass 1: final → temp
  for (let i = 0; i < entries.length; i++) {
    const u = entries[i];
    const tempRel = parentPath(u.from) ? parentPath(u.from) + '/' + tempPrefix + i + '_' + baseName(u.to) : tempPrefix + i + '_' + baseName(u.to);
    try {
      await App.storage.move(u.from, tempRel);
      entries[i]._tempRel = tempRel;
    } catch(e) { failCount++; entries[i]._tempRel = null; }
  }

  // Pass 2: temp → original
  for (let i = 0; i < entries.length; i++) {
    if (!entries[i]._tempRel) continue;
    try {
      await App.storage.move(entries[i]._tempRel, entries[i].to);
    } catch(e) { failCount++; }
  }

  App.undoHistory = null;
  if (failCount > 0) toast(`元に戻す完了（${failCount}件エラー）`);
  else toast('元に戻しました');

  updateUndoBtn();
  loadFolder(App.currentPath);
}

// ════════════════════════════════════════
// Image Viewer
// ════════════════════════════════════════
function openViewer(entry) {
  App.viewerImages = App.entries.filter(e => e['.tag'] === 'file' && IMG_EXT.has(ext(e.name)));
  const idx = App.viewerImages.indexOf(entry);
  if (idx === -1) return;
  App.viewerIndex = idx;
  App.viewerVisible = true;

  // Clear previous image immediately
  const img = $('#viewer-img');
  img.removeAttribute('src');
  img.classList.add('loading');

  $('#viewer').classList.add('active');
  showViewerBar();
  loadViewerPage(idx);
  updateViewerSlider();
  history.pushState({ viewer: true }, '', location.hash);
}

function closeViewer() {
  if (!App.viewerVisible) return;
  App.viewerVisible = false;
  $('#viewer').classList.remove('active');
  // Clear image to prevent flash next time
  $('#viewer-img').removeAttribute('src');
  // Revoke prefetch URLs
  for (const u of Object.values(App.prefetchCache)) URL.revokeObjectURL(u);
  App.prefetchCache = {};
}

let viewerLoadGen = 0;
async function loadViewerPage(idx) {
  if (idx < 0 || idx >= App.viewerImages.length) return;
  App.viewerIndex = idx;
  const entry = App.viewerImages[idx];
  const rel = entryRelPath(entry);
  const img = $('#viewer-img');
  const gen = ++viewerLoadGen;

  $('#viewer-title').textContent = entry.name;
  updateViewerSlider();

  // Clear old src immediately, show loading
  img.removeAttribute('src');
  img.classList.add('loading');

  try {
    let url = App.prefetchCache[rel];
    if (!url) {
      const buf = await App.storage.loadBinary(rel);
      if (gen !== viewerLoadGen) return; // stale
      const e = ext(entry.name);
      const mime = e === 'svg' ? 'image/svg+xml' : 'image/' + (e === 'jpg' ? 'jpeg' : e);
      url = URL.createObjectURL(new Blob([buf], { type: mime }));
    }
    if (gen !== viewerLoadGen) return;
    img.src = url;
    img.onload = () => { if (gen === viewerLoadGen) img.classList.remove('loading'); };
  } catch(e) {
    if (gen === viewerLoadGen) img.classList.remove('loading');
  }

  // Prefetch neighbors (fire and forget, don't block)
  prefetchViewer(idx);
}

async function prefetchViewer(cur) {
  // Prefetch ±3 pages for smoother navigation
  for (const off of [1, -1, 2, -2, 3, -3]) {
    const i = cur + off;
    if (i < 0 || i >= App.viewerImages.length) continue;
    const rel = entryRelPath(App.viewerImages[i]);
    if (App.prefetchCache[rel]) continue;
    try {
      const buf = await App.storage.loadBinary(rel);
      const e = ext(App.viewerImages[i].name);
      const mime = e === 'svg' ? 'image/svg+xml' : 'image/' + (e === 'jpg' ? 'jpeg' : e);
      App.prefetchCache[rel] = URL.createObjectURL(new Blob([buf], { type: mime }));
    } catch(_) {}
  }
}

function viewerPrev() { if (App.viewerIndex > 0) loadViewerPage(App.viewerIndex - 1); }
function viewerNext() { if (App.viewerIndex < App.viewerImages.length - 1) loadViewerPage(App.viewerIndex + 1); }

function updateViewerSlider() {
  const s = $('#viewer-slider');
  s.max = App.viewerImages.length - 1;
  s.value = App.viewerIndex;
  $('#viewer-page-label').textContent = `${App.viewerIndex + 1} / ${App.viewerImages.length}`;
}

function showViewerBar() {
  $('#viewer-topbar').classList.add('visible');
  $('#viewer-bottombar').classList.add('visible');
  clearTimeout(App.toolbarTimer);
  App.toolbarTimer = setTimeout(() => {
    if (App.viewerVisible) {
      $('#viewer-topbar').classList.remove('visible');
      $('#viewer-bottombar').classList.remove('visible');
    }
  }, 3000);
}

// ════════════════════════════════════════
// Events
// ════════════════════════════════════════
function setupEvents() {
  // Nav buttons
  $('#btn-back').onclick = () => history.back();
  $('#btn-forward').onclick = () => history.forward();
  $('#btn-up').onclick = () => { if (App.currentPath) navigate(parentPath(App.currentPath)); };
  $('#btn-refresh').onclick = () => loadFolder(App.currentPath);
  $('#btn-disconnect').onclick = () => App.storage.disconnect();
  $('#btn-sidebar').onclick = () => {
    const sb = $('#sidebar');
    const isMobile = window.innerWidth <= 700;
    if (isMobile) {
      sb.classList.toggle('mobile-open');
    } else {
      sb.classList.toggle('hidden');
      IDB.put('settings', 'sidebarHidden', sb.classList.contains('hidden'));
    }
  };

  // Breadcrumb
  $('#breadcrumb').addEventListener('click', e => {
    const item = e.target.closest('.bc-item');
    if (item && !item.classList.contains('current')) navigate(item.dataset.path);
  });

  // Sort
  $('#sort-select').onchange = e => {
    App.sortMode = e.target.value;
    IDB.put('settings', 'sortMode', App.sortMode);
    App.entries = sortEntries(App.entries);
    renderGrid(App.navGen);
  };

  // Thumb slider
  $('#thumb-slider').oninput = e => {
    App.thumbSize = parseInt(e.target.value);
    document.documentElement.style.setProperty('--thumb-size', App.thumbSize);
    IDB.put('settings', 'thumbSize', App.thumbSize);
  };

  // Favorites
  $('#btn-add-fav').onclick = () => addFavorite(App.currentPath);
  $('#fav-list').addEventListener('click', e => {
    const rm = e.target.closest('.fav-remove');
    if (rm) { removeFavorite(parseInt(rm.dataset.index)); return; }
    const item = e.target.closest('.fav-item');
    if (item) { navigate(item.dataset.path); $('#sidebar').classList.remove('mobile-open'); }
  });

  // Grid double click / double tap
  let lastTapT = 0, lastTapEl = null;
  $('#grid').addEventListener('click', e => {
    const item = e.target.closest('.grid-item');
    if (!item) return;
    const now = Date.now();
    if (now - lastTapT < 350 && lastTapEl === item) { handleOpen(item); lastTapT = 0; return; }
    lastTapT = now; lastTapEl = item;
  });
  $('#grid').addEventListener('dblclick', e => {
    const item = e.target.closest('.grid-item');
    if (item) handleOpen(item);
  });

  // Context menu
  $('#grid').addEventListener('contextmenu', e => {
    const item = e.target.closest('.grid-item');
    if (!item) return;
    e.preventDefault();
    const entry = App.entries[parseInt(item.dataset.index)];
    if (entry) showCtx(e.clientX, e.clientY, entry);
  });
  let lpT = null;
  $('#grid').addEventListener('touchstart', e => {
    if (App.sortModeActive) return; // D&D handles touch in sort mode
    const item = e.target.closest('.grid-item');
    if (!item) return;
    lpT = setTimeout(() => {
      const entry = App.entries[parseInt(item.dataset.index)];
      if (entry) showCtx(e.touches[0].clientX, e.touches[0].clientY, entry);
    }, 500);
  }, { passive: true });
  $('#grid').addEventListener('touchend', () => clearTimeout(lpT));
  $('#grid').addEventListener('touchmove', () => clearTimeout(lpT));

  document.addEventListener('click', e => { if (!e.target.closest('#ctx-menu')) hideCtx(); });
  $('#ctx-menu').addEventListener('click', e => {
    const item = e.target.closest('.ctx-item');
    if (item) doCtx(item.dataset.action);
  });

  // Rename
  $('#rename-ok').onclick = execRename;
  $('#rename-cancel').onclick = () => $('#modal-rename').classList.remove('show');
  $('#rename-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') execRename();
    if (e.key === 'Escape') $('#modal-rename').classList.remove('show');
  });

  // Phase 2: Sort mode
  $('#btn-sort-mode').onclick = () => {
    if (App.sortModeActive) exitSortMode();
    else enterSortMode();
  };
  $('#btn-sort-cancel').onclick = exitSortMode;
  $('#btn-sort-reset').onclick = resetSortOrder;
  $('#btn-rename-exec').onclick = openBatchRename;
  $('#btn-undo').onclick = undoRename;

  // Batch rename modal
  $('#batch-cancel').onclick = () => $('#modal-batch-rename').classList.remove('show');
  $('#batch-exec').onclick = executeBatchRename;
  $('#preset-select').onchange = () => {
    const v = $('#preset-select').value;
    $('#prefix-row').classList.toggle('show', v === 'prefix_nnn');
    $('#custom-row').style.display = v === 'custom' ? 'flex' : 'none';
    updateRenamePreview();
  };
  $('#prefix-input').oninput = updateRenamePreview;
  $('#custom-input').oninput = updateRenamePreview;

  // D&D reorder (one-time delegation setup)
  initDragReorder();

  // Viewer
  $('#viewer-close').onclick = () => { closeViewer(); history.back(); };
  $('#tap-left').onclick = viewerPrev;
  $('#tap-right').onclick = viewerNext;
  $('#tap-center').onclick = showViewerBar;
  $('#viewer-slider').oninput = e => loadViewerPage(parseInt(e.target.value));

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.target.closest('input')) return;
    if (App.viewerVisible) {
      if (e.key === 'Escape') { closeViewer(); history.back(); }
      else if (e.key === 'ArrowLeft') viewerPrev();
      else if (e.key === 'ArrowRight') viewerNext();
      return;
    }
    if (e.key === 'Backspace') { e.preventDefault(); if (App.currentPath) navigate(parentPath(App.currentPath)); }
    if (e.key === 'z' && (e.ctrlKey || e.metaKey) && App.undoHistory) { e.preventDefault(); undoRename(); }
    if (e.key === 'Escape' && App.sortModeActive) exitSortMode();
  });

  // Viewer swipe
  let sx = 0;
  $('#viewer-img-wrap').addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
  $('#viewer-img-wrap').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) > 50) dx > 0 ? viewerPrev() : viewerNext();
  });
  $('#viewer').addEventListener('mousemove', () => { if (App.viewerVisible) showViewerBar(); });

  // Viewer wheel
  let wCD = false;
  $('#viewer').addEventListener('wheel', e => {
    if (!App.viewerVisible || wCD) return;
    e.preventDefault(); wCD = true;
    setTimeout(() => wCD = false, 200);
    e.deltaY > 0 ? viewerNext() : viewerPrev();
  }, { passive: false });

  // ── History API: popstate ──
  window.addEventListener('popstate', () => {
    if (App.viewerVisible) {
      closeViewer();
      return;
    }
    const p = pathFromHash() ?? '';
    if (p !== App.currentPath) {
      App.currentPath = p;
      IDB.put('settings', 'lastPath', p);
      updateNavButtons();
      renderBreadcrumb();
      renderFavorites();
      loadFolder(p);
    }
  });
}

function handleOpen(el) {
  if (App.sortModeActive) return; // no navigation in sort mode
  const entry = App.entries[parseInt(el.dataset.index)];
  if (!entry) return;
  if (entry['.tag'] === 'folder') navigate(entryRelPath(entry));
  else if (IMG_EXT.has(ext(entry.name))) openViewer(entry);
}

// ════════════════════════════════════════
// Start
// ════════════════════════════════════════
document.addEventListener('DOMContentLoaded', init);
</script>
